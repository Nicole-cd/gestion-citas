<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agenda{% endblock %} · Gestión de Citas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <div class="d-flex" style="min-height:100vh;">

        <!-- Sidebar (col fija en desktop, offcanvas en móvil) -->
        <nav class="sidebar bg-dark text-white p-3 d-none d-lg-flex flex-column" style="width:230px;">
            {% include "citas/_nav_items.html" %}
        </nav>

        <div class="offcanvas offcanvas-start bg-dark text-white d-lg-none" tabindex="-1" id="sidebarMovil">
            <div class="offcanvas-header">
                <span class="navbar-brand text-white mb-0">Agenda</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                {% include "citas/_nav_items.html" %}
            </div>
        </div>

        <!-- Contenido -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-white border-bottom d-lg-none px-3">
                <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMovil">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0">Agenda</span>
            </nav>

            <main class="container-fluid p-4 p-lg-5" style="max-width:1180px;">
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'secondary' }} py-2">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>

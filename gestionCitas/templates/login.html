<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Agenda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="d-flex align-items-center" style="min-height:100vh;">
    <div class="container" style="max-width:420px;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="border-bottom border-dark border-2 pb-3 mb-4">
                    <small class="text-warning text-uppercase d-block"
                        style="letter-spacing:.1em;font-size:.7rem;">Citas para freelancers</small>
                    <h1 class="h3 mb-0">Agenda</h1>
                </div>

                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2">{{ form.non_field_errors }}</div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_correo" class="form-label fw-semibold small">Correo electrónico</label>
                        <input type="email" class="form-control" id="id_correo" name="correo"
                            placeholder="tunombre@correo.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold small">Contraseña</label>
                        <input type="password" class="form-control" id="id_password" name="password"
                            placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>

                <p class="text-center text-secondary small mt-4 mb-0">
                    ¿Aún no tienes cuenta? <a href="{% url 'registro' %}">Crear una cuenta</a>
                </p>
            </div>
        </div>
    </div>










    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
